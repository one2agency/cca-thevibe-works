      </div>
      <p class="muted" id="poolinfo" style="font-size:14px"></p>
      <div style="margin-top:18px"><button class="btn accent" id="startp">Почати практику →</button></div>
    </div>`;

  $('#back').onclick = renderHome;
  const allChips = [...app.querySelectorAll('[data-t]')];
  function setScope(t,v){
    T.scope = {type:t, val:+v||null};
    allChips.forEach(c=>{c.classList.remove('on','accent');});
    const me = allChips.find(c=>c.dataset.t===t && c.dataset.v===String(v));
    me.classList.add('on'); if(t==='all') me.classList.add('accent');
    updatePool();
  }
  allChips.forEach(c=>c.onclick=()=>setScope(c.dataset.t,c.dataset.v));
  const countChips=[...app.querySelectorAll('[data-c]')];
  countChips.forEach(c=>c.onclick=()=>{countChips.forEach(x=>x.classList.remove('on'));c.classList.add('on');T.count=+c.dataset.c;updatePool();});
  function poolSize(){let p=QB; if(T.scope.type==='domain')p=QB.filter(q=>q.d===T.scope.val); if(T.scope.type==='scenario')p=QB.filter(q=>q.s===T.scope.val); return p.length;}
  function updatePool(){const ps=poolSize();const n=(!T.count||T.count>ps)?ps:T.count;$('#poolinfo').textContent=`У вибірці: ${ps} питань · буде показано ${n}.`;}
  updatePool();
  $('#startp').onclick=()=>{
    T.questions = buildPractice(T.scope, T.count);
    if(!T.questions.length){return;}
    T.mode='practice'; T.i=0; T.answers={}; T.locked={};
    renderRun();
  };
}

/* ---------- START EXAM ---------- */
function startExam(){
  T = {mode:'exam', questions:buildExam(), i:0, answers:{}, marked:{}, endTime:Date.now()+120*60*1000};
  renderRun();
  startTimer();
}

/* ---------- TIMER ---------- */
function startTimer(){stopTimer(); timerId=setInterval(tick,1000); tick();}
function stopTimer(){if(timerId){clearInterval(timerId);timerId=null;}}
function tick(){
  const el=$('#timer'); if(!el){return;}
  let left=Math.max(0,Math.round((T.endTime-Date.now())/1000));
  const m=String(Math.floor(left/60)).padStart(2,'0'), s=String(left%60).padStart(2,'0');
  el.textContent=`${m}:${s}`;
  el.className='timer'+(left<=60?' crit':left<=300?' warn':'');
  if(left<=0){stopTimer(); finishExam();}
}

/* ---------- RENDER: RUN (one question) ---------- */
function renderRun(){
  const q=T.questions[T.i];
  const total=T.questions.length;
  const answered=Object.keys(T.answers).length;
  const isExam=T.mode==='exam';
  const locked = !isExam && T.locked[T.i];
  const chosen = T.answers[T.i];

  const top = isExam ? `
    <div class="topbar"><div class="inner">
      <span class="tag">Екзамен</span>
      <div id="timer" class="timer">120:00</div>
      <div class="progresswrap">
        <div class="pbar"><i style="width:${answered/total*100}%"></i></div>
        <div class="muted" style="font-size:13px; margin-top:5px">Відповідей: ${answered}/${total}</div>
      </div>
      <button class="btn accent" id="submitTop" style="padding:9px 18px; font-size:15px">Завершити</button>
    </div></div>` : `
    <div class="topbar"><div class="inner">
      <button class="btn ghost" id="exitp" style="padding:8px 16px; font-size:14px">← Вихід</button>
      <span class="tag">Практика</span>
      <div class="progresswrap">
        <div class="pbar"><i style="width:${(T.i+1)/total*100}%"></i></div>
        <div class="muted" style="font-size:13px; margin-top:5px">Питання ${T.i+1} з ${total} · правильних: ${practiceScore()}/${Object.keys(T.locked).length}</div>
      </div>
    </div></div>`;

  const sc=SCEN[q.s];
  const answers = q.opts.map((o,i)=>{
    let cls='ans';
    if(locked){
      cls+=' locked';
      if(i===q.correct) cls+=' correct';
      else if(i===chosen) cls+=' wrong';
    } else if(i===chosen){ cls+=' sel'; }
    return `<div class="${cls}" data-i="${i}"><div class="key">${letter(i)}</div><div class="txt">${o}</div></div>`;
  }).join('');

  let explain='';
  if(locked){
    const right = chosen===q.correct;
    explain=`<div class="explain ${right?'':'bad'}">
      <div class="lbl">${right?'Правильно':'Правильна відповідь: '+letter(q.correct)}</div>
      <p>${q._orig.ex}</p></div>`;
  }

  const nav = isExam ? `
    <div class="navrow">
      <button class="btn ghost" id="prev" ${T.i===0?'disabled':''}>← Назад</button>
      <button class="markbtn ${T.marked[T.i]?'on':''}" id="mark">${T.marked[T.i]?'★ Позначено':'☆ Позначити'}</button>
      <button class="btn" id="next">${T.i===total-1?'До огляду →':'Далі →'}</button>
    </div>
    ${renderPalette()}` : `
    <div class="navrow">
      <button class="btn ghost" id="prev" ${T.i===0?'disabled':''}>← Назад</button>
      ${locked ? `<button class="btn" id="next">${T.i===total-1?'Підсумок →':'Далі →'}</button>`
               : `<button class="btn accent" id="check" ${chosen==null?'disabled':''}>Перевірити</button>`}
    </div>`;

  app.innerHTML = top + `
    <div class="scenario">
      <span class="tag">Сценарій ${q.s} · Домен ${q.d}</span>
      <div style="font-family:var(--disp); font-weight:600; font-size:17px; margin-top:4px">${sc.t}</div>
      <p>${sc.p}</p>
    </div>
    <div class="card qcard">
      <div class="qmeta"><span class="qnum">№ ${T.i+1} / ${total}</span></div>
      <div class="qtext">${q.q}</div>
      <div class="answers" id="answers">${answers}</div>
      ${explain}
      ${nav}
    </div>`;

  // wire answers
  if(!locked){
    [...app.querySelectorAll('.ans')].forEach(a=>a.onclick=()=>{
      T.answers[T.i]=+a.dataset.i;
      if(T.mode==='exam'){ renderRun(); startTimer(); }
      else renderRun();
    });
  }
  // wire nav
  const prev=$('#prev'); if(prev)prev.onclick=()=>{T.i--;renderRun();if(isExam)startTimer();};
  const next=$('#next'); if(next)next.onclick=()=>{ if(T.i===total-1 && isExam){renderReview();} else if(T.i===total-1 && !isExam){finishPractice();} else {T.i++;renderRun();} };
  const mark=$('#mark'); if(mark)mark.onclick=()=>{T.marked[T.i]=!T.marked[T.i];renderRun();startTimer();};
  const check=$('#check'); if(check)check.onclick=()=>{ if(T.answers[T.i]==null)return; T.locked[T.i]=true; renderRun(); };
  const st=$('#submitTop'); if(st)st.onclick=renderReview;
  const ex=$('#exitp'); if(ex)ex.onclick=()=>{ if(confirm('Вийти з практики? Прогрес не збережеться.')) renderHome(); };
  if(isExam) startTimer();
}

function practiceScore(){return Object.keys(T.locked).reduce((n,k)=>n+(T.answers[k]===T.questions[k].correct?1:0),0);}

function renderPalette(){
  const dots=T.questions.map((q,i)=>{
    let cls='pdot';
    if(T.answers[i]!=null)cls+=' answered';
    if(i===T.i)cls+=' current';
    if(T.marked[i])cls+=' marked';
    return `<button class="${cls}" data-j="${i}">${i+1}</button>`;
  }).join('');
  return `<div class="card palette">${dots}</div>`;
}
function wirePalette(){[...app.querySelectorAll('.pdot')].forEach(d=>d.onclick=()=>{T.i=+d.dataset.j;renderRun();startTimer();});}

/* ---------- REVIEW (exam, before submit) ---------- */
function renderReview(){
  stopTimer();
  const total=T.questions.length;
  const answered=Object.keys(T.answers).length;
  const blank=total-answered;
  const dots=T.questions.map((q,i)=>{
    let cls='pdot'; if(T.answers[i]!=null)cls+=' answered'; if(T.marked[i])cls+=' marked';
    return `<button class="${cls}" data-j="${i}">${i+1}</button>`;
  }).join('');
  app.innerHTML=`
    <h1 style="font-size:32px">Огляд перед завершенням</h1>
    <p class="muted">Можна повернутись до будь-якого питання. Без відповіді: <b>${blank}</b> (рахуються як неправильні).</p>
    <div class="card palette" style="margin-top:18px">${dots}</div>
    <div class="navrow" style="margin-top:24px">
      <button class="btn ghost" id="resume">← Повернутись до питань</button>
      <button class="btn accent" id="finish">Завершити екзамен та показати результат</button>
    </div>`;
  [...app.querySelectorAll('.pdot')].forEach(d=>d.onclick=()=>{T.i=+d.dataset.j;renderRun();startTimer();});
  $('#resume').onclick=()=>{renderRun();startTimer();};
  $('#finish').onclick=()=>{ if(confirm('Завершити екзамен?')) finishExam(); };
}

/* ---------- RESULTS ---------- */
function finishExam(){
  stopTimer();
  const total=T.questions.length;
  let correct=0; const byDom={};
  T.questions.forEach((q,i)=>{
    const ok=T.answers[i]===q.correct; if(ok)correct++;
    byDom[q.d]=byDom[q.d]||{c:0,n:0}; byDom[q.d].n++; if(ok)byDom[q.d].c++;
  });
  const scaled=Math.round(100+ (correct/total)*900);
  const pass=scaled>=PASS_SCALED;
  renderResults({correct,total,scaled,pass,byDom});
}
function finishPractice(){
  // ensure last is locked counted; practice summary
  const total=T.questions.length;
  let correct=0; const byDom={};
  T.questions.forEach((q,i)=>{
    const ok=T.answers[i]===q.correct; if(ok)correct++;
    byDom[q.d]=byDom[q.d]||{c:0,n:0}; byDom[q.d].n++; if(ok)byDom[q.d].c++;
  });
  const scaled=Math.round(100+(correct/total)*900);
  renderResults({correct,total,scaled,pass:scaled>=PASS_SCALED,byDom,practice:true});
}

function renderResults(r){
  const pct=Math.round(r.correct/r.total*100);
  const C=2*Math.PI*80;
  const off=C*(1-r.correct/r.total);
  const ringColor=r.pass?'var(--good)':'var(--bad)';
  const domHtml=Object.entries(r.byDom).sort((a,b)=>a[0]-b[0]).map(([k,v])=>{
    const p=Math.round(v.c/v.n*100);
    return `<div class="dscore">
      <span class="tag" style="flex:0 0 auto">D${k}</span>
      <div class="bar"><i style="width:${p}%; background:${p>=70?'linear-gradient(90deg,var(--good),#5ca06b)':'linear-gradient(90deg,var(--accent),#e0793f)'}"></i></div>
      <span class="n">${v.c}/${v.n} · ${p}%</span>
    </div>
    <div class="muted" style="font-size:12.5px; margin:-7px 0 12px 6px">${DOMAINS[k].name}</div>`;
  }).join('');

  app.innerHTML=`
    <div class="card scorehero">
      <div class="brandline">${r.practice?'Підсумок практики':'Результат екзамену'}</div>
      <div class="ring">
        <svg viewBox="0 0 180 180" width="190" height="190">
          <circle cx="90" cy="90" r="80" fill="none" stroke="#e3d6c0" stroke-width="13"/>
          <circle cx="90" cy="90" r="80" fill="none" stroke="${ringColor}" stroke-width="13" stroke-linecap="round"
            stroke-dasharray="${C}" stroke-dashoffset="${off}" transform="rotate(-90 90 90)"/>
          <text x="90" y="84" text-anchor="middle" font-family="var(--disp)" font-size="40" font-weight="600" fill="var(--ink)">${pct}%</text>
          <text x="90" y="108" text-anchor="middle" font-family="var(--mono)" font-size="13" fill="var(--ink2)">${r.correct}/${r.total}</text>
        </svg>
      </div>
      <div class="scaled">${r.scaled}</div>
      <div class="muted" style="font-family:var(--mono);font-size:13px">scaled score (100–1000)</div>
      <div class="verdict ${r.pass?'pass':'fail'}">${r.pass?'✓ Прохідний (≥ '+PASS_SCALED+')':'✗ Нижче порогу '+PASS_SCALED}</div>
    </div>

    <div class="resgrid">
      <div class="card minicard">
        <h3>Точність за доменами</h3>
        ${domHtml}
      </div>
      <div class="card minicard">
        <h3>Що далі</h3>
        <p style="font-size:15px;margin-top:0">Зверни увагу на домени з результатом нижче 70% — це найслабші зони. Нижче можна переглянути кожне питання з поясненням.</p>
        <div style="display:flex;flex-direction:column;gap:10px;margin-top:14px">
          <button class="btn" id="reviewAll">Розбір усіх питань ↓</button>
          <button class="btn ghost" id="again">${r.practice?'Нова практика':'Новий екзамен'}</button>
          <button class="btn ghost" id="home">На головну</button>
        </div>
      </div>
    </div>
    <div id="reviewZone"></div>`;

  $('#home').onclick=renderHome;
  $('#again').onclick=r.practice?renderPracticeConfig:startExam;
  $('#reviewAll').onclick=()=>{renderAnswerReview(); $('#reviewZone').scrollIntoView({behavior:'smooth'});};
}

function renderAnswerReview(){
  const z=$('#reviewZone');
  let filter='all';
  function draw(){
    const items=T.questions.map((q,i)=>({q,i,chosen:T.answers[i],ok:T.answers[i]===q.correct}))
      .filter(x=> filter==='all' ? true : filter==='wrong' ? !x.ok : filter==='blank' ? x.chosen==null : true);
    const cards=items.map(({q,i,chosen,ok})=>{
      const ans=q.opts.map((o,j)=>{
        let cls='ans locked';
        if(j===q.correct)cls+=' correct';
        else if(j===chosen)cls+=' wrong';
        return `<div class="${cls}"><div class="key">${letter(j)}</div><div class="txt">${o}</div></div>`;
      }).join('');
      const tag = chosen==null ? '<span class="tag" style="background:#e9ddc8">Без відповіді</span>'
                : ok ? '<span class="tag" style="background:var(--goodbg);color:var(--good)">Правильно</span>'
                     : '<span class="tag" style="background:var(--badbg);color:var(--bad)">Помилка</span>';
      return `<div class="card qcard" style="margin-top:16px">
        <div class="qmeta">${tag}<span class="tag">Сценарій ${q.s} · Домен ${q.d}</span><span class="qnum">№ ${i+1}</span></div>
        <div class="qtext" style="font-size:18px">${q.q}</div>
        <div class="answers">${ans}</div>
        <div class="explain ${ok?'':'bad'}"><div class="lbl">Пояснення</div><p>${q._orig.ex}</p></div>
      </div>`;
    }).join('');
    z.innerHTML=`
      <div class="reviewfilter">
        <button class="chip ${filter==='all'?'on':''}" data-f="all">Усі (${T.questions.length})</button>
        <button class="chip ${filter==='wrong'?'on':''}" data-f="wrong">Лише помилки</button>
        <button class="chip ${filter==='blank'?'on':''}" data-f="blank">Без відповіді</button>
      </div>
      ${cards || '<p class="muted">Нічого немає в цьому фільтрі 🎉</p>'}`;
    [...z.querySelectorAll('[data-f]')].forEach(b=>b.onclick=()=>{filter=b.dataset.f;draw();});
  }
  draw();
}

/* boot */
renderHome();
</script>
</body>
</html>
