<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- бренд-сквіркл, accent orange -->
  <rect x="0" y="0" width="64" height="64" rx="15" fill="#c2511f"/>
  <!-- легкий теплий відблиск згори -->
  <rect x="0" y="0" width="64" height="64" rx="15" fill="url(#g)"/>
  <defs>
    <radialGradient id="g" cx="30%" cy="18%" r="80%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.18"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- кільце "C" (paper), відкрите праворуч -->
  <circle cx="32" cy="32" r="18.5" fill="#f3ece0"/>
  <circle cx="32" cy="32" r="9.5" fill="#c2511f"/>
  <!-- проріз справа → відкриває літеру C, мов приціл -->
  <rect x="39" y="26.5" width="17" height="11" fill="#c2511f"/>
  <!-- центральна точка-ціль (paper) -->
  <circle cx="32" cy="32" r="4.6" fill="#f3ece0"/>
</svg>
